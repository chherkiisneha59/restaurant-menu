<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utopia | Premium Veg Dining</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --faded-black: #1a1a1a;
            --gold: #d4af37;
            --emerald: #10b981;
            --white: #ffffff;
            --gray: #2d2d2d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }

        body {
            background-color: var(--faded-black);
            color: var(--white);
            font-family: 'Montserrat', sans-serif;
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }

        /* --- Navigation --- */
        nav {
            position: fixed;
            top: 0; width: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            z-index: 1000;
            border-bottom: 2px solid var(--gold);
        }

        .logo { font-family: 'Cinzel', serif; font-size: 1.8rem; color: var(--gold); letter-spacing: 4px; }

        .nav-links a {
            text-decoration: none;
            color: var(--white);
            margin-left: 25px;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .nav-links a:hover { color: var(--emerald); }

        /* --- Hero --- */
        header {
            height: 40vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?auto=format&fit=crop&q=80&w=1600');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            margin-top: 60px;
        }

        header h1 { font-family: 'Cinzel', serif; font-size: 4rem; color: var(--gold); }
        header p { font-size: 1.2rem; letter-spacing: 5px; text-transform: uppercase; color: var(--emerald); }

        /* --- Menu Layout --- */
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }

        .section-header {
            text-align: center;
            margin: 60px 0 40px;
        }

        .section-header h2 {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            color: var(--gold);
            display: inline-block;
            border-bottom: 3px solid var(--emerald);
            padding-bottom: 10px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 40px;
        }

        /* --- Food Cards --- */
        .food-card {
            background: var(--gray);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: 0.4s;
            border: 1px solid #3d3d3d;
        }

        .food-card:hover { transform: translateY(-10px); border-color: var(--gold); }

        .food-image { width: 100%; height: 220px; overflow: hidden; }
        .food-image img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        .food-card:hover .food-image img { transform: scale(1.1); }

        .food-info { padding: 25px; text-align: center; }
        .food-info h3 { font-size: 1.1rem; color: var(--white); margin-bottom: 10px; height: 50px; }
        .price { color: var(--emerald); font-weight: 700; font-size: 1.3rem; display: block; margin-bottom: 15px; }

        /* --- Hover Overlay --- */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            color: var(--white);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
            opacity: 0;
            transition: 0.4s;
            pointer-events: none;
        }

        .food-card:hover .overlay { opacity: 1; pointer-events: all; }
        .overlay p { font-size: 0.9rem; font-style: italic; margin-bottom: 25px; line-height: 1.6; }

        .add-btn {
            background: var(--gold);
            color: black;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.75rem;
            transition: 0.3s;
        }

        .add-btn:hover { background: var(--emerald); color: white; }

        /* --- Floating Add to Cart --- */
        .cart-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--emerald);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 2000;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .cart-count {
            background: var(--gold);
            width: 30px; height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: black;
        }

        footer { background: #000; padding: 40px; text-align: center; border-top: 2px solid var(--gold); margin-top: 60px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">UTOPIA</div>
        <div class="nav-links">
            <a href="#starters">Starters</a>
            <a href="#main">Main Course</a>
            <a href="#drinks">Drinks</a>
        </div>
    </nav>

    <header>
        <h1>UTOPIA</h1>
        <p>Fine Dining Experience</p>
    </header>

    <div class="cart-float">
        <span>Add to Cart</span>
        <div class="cart-count" id="cart-count">0</div>
    </div>

    <div class="container">
        <div class="section-header" id="starters"><h2>The Starters</h2></div>
        <div class="menu-grid" id="starters-grid"></div>

        <div class="section-header" id="main"><h2>The Main Course</h2></div>
        <div class="menu-grid" id="main-grid"></div>

        <div class="section-header" id="drinks"><h2>The Artisanal Drinks</h2></div>
        <div class="menu-grid" id="drinks-grid"></div>
    </div>

    <footer>
        <p style="color: var(--gold);">© 2024 Utopia Restaurant Group</p>
        <p style="font-size: 0.8rem; opacity: 0.6; margin-top: 10px;">Luxury Experience | Pure Vegetarian</p>
    </footer>

    <script>
        const starters = [
            { name: "Saffron Paneer Tikka", price: 480, desc: "Soft cottage cheese infused with Kashmiri saffron and grilled in a clay oven.", img: "https://images.unsplash.com/photo-1599487488170-d11ec9c172f0?auto=format&fit=crop&q=80&w=400" },
            { name: "Crispy Spring Rolls", price: 410, desc: "Golden-fried pastry stuffed with farm-fresh vegetables and glass noodles.", img: "https://images.unsplash.com/photo-1544025162-d76694265947?auto=format&fit=crop&q=80&w=400" },
            { name: "Peri Peri Corn", price: 420, desc: "Sweet American corn tossed in fiery peri-peri spices and lime juice.", img: "https://images.unsplash.com/photo-1600335895229-6e75511892c8?auto=format&fit=crop&q=80&w=400" },
            { name: "Chilli Mushroom", price: 450, desc: "Fresh button mushrooms wok-tossed in a spicy and tangy oriental glaze.", img: "https://images.unsplash.com/photo-1626074353765-517a681e40be?auto=format&fit=crop&q=80&w=400" },
            { name: "Tomato Bruschetta", price: 430, desc: "Toasted sourdough slices topped with marinated tomatoes and fresh basil.", img: "https://images.unsplash.com/photo-1572656631137-7935297eff55?auto=format&fit=crop&q=80&w=400" },
            { name: "Cheese Loaded Nachos", price: 460, desc: "Crunchy corn chips topped with jalapeños, olives, and melted cheddar.", img: "https://images.unsplash.com/photo-1513456852971-30c0b8199d4d?auto=format&fit=crop&q=80&w=400" },
        ];

        const mains = [
            { name: "Dal Makhani Special", price: 520, desc: "Overnight slow-cooked black lentils with cream and house-made butter.", img: "https://images.unsplash.com/photo-1546833999-b9f581a1996d?auto=format&fit=crop&q=80&w=400" },
            { name: "Veg Dum Biryani", price: 580, desc: "Fragrant basmati rice slow-cooked with aromatic spices and vegetables.", img: "https://images.unsplash.com/photo-1563379091339-03b21ab4a4f8?auto=format&fit=crop&q=80&w=400" },
            { name: "Thai Green Veg Curry", price: 550, desc: "Authentic spicy green curry served with steamed jasmine rice.", img: "https://images.unsplash.com/photo-1455619452474-d2be8b1e70cd?auto=format&fit=crop&q=80&w=400" },
            { name: "Classic Palak Paneer", price: 530, desc: "Fresh spinach puree tempered with garlic and loaded with paneer.", img: "https://images.unsplash.com/photo-1613292443284-8d10ef9383fe?auto=format&fit=crop&q=80&w=400" },
            { name: "Veg Hakka Noodles", price: 480, desc: "Wok-tossed noodles with colorful peppers and organic soy sauce.", img: "https://images.unsplash.com/photo-1585032226651-759b368d7246?auto=format&fit=crop&q=80&w=400" },
            
            { name: "Malai Kofta Utopia", price: 570, desc: "Soft dumplings made of paneer and potato in a velvety cashew gravy.", img: "https://images.unsplash.com/photo-1589302168068-964664d93dc0?auto=format&fit=crop&q=80&w=400" },
            { name: "Wild Mushroom Pasta", price: 540, desc: "Penne pasta tossed in a creamy forest mushroom and parmesan sauce.", img: "https://images.unsplash.com/photo-1473093226795-af9932fe5856?auto=format&fit=crop&q=80&w=400" },
            
        ];

        const drinks = [
            { name: "Virgin Mint Mojito", price: 400, desc: "Refreshing muddle of fresh mint, lime, and sparkling soda water.", img: "https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?auto=format&fit=crop&q=80&w=400" },
            { name: "Peach Iced Tea", price: 410, desc: "Cold-brewed tea with natural peach nectar and slices of lemon.", img: "https://images.unsplash.com/photo-1556679343-c7306c1976bc?auto=format&fit=crop&q=80&w=400" },
            { name: "Luxury Hot Chocolate", price: 480, desc: "Melted dark chocolate with steamed milk and a hint of cinnamon.", img: "https://images.unsplash.com/photo-1544739313-6fad02872377?auto=format&fit=crop&q=80&w=400"},
            { name: "Blue Lagoon Mocktail", price: 420, desc: "Tropical blue curacao with lemonade and a maraschino cherry.", img: "https://images.unsplash.com/photo-1551024709-8f23befc6f87?auto=format&fit=crop&q=80&w=400" },
            { name: "Royal Masala Chai", price: 400, desc: "Hand-picked tea leaves brewed with cardamom, ginger, and cloves.", img: "https://images.unsplash.com/photo-1561336313-0bd5e0b27ec8?auto=format&fit=crop&q=80&w=400" },
            { name: "Sparkling Lemonade", price: 390, desc: "Zesty lemon juice with a touch of mint and effervescent bubbles.", img: "https://images.unsplash.com/photo-1536935338788-846bb9981813?auto=format&fit=crop&q=80&w=400" },
            { name: "Brownie Blast Shake", price: 480, desc: "Indulgent shake blended with fudge brownies and chocolate chips.", img: "https://images.unsplash.com/photo-1572490122747-3968b75cc699?auto=format&fit=crop&q=80&w=400" }
        ];

        function createGrid(data, containerId) {
            const container = document.getElementById(containerId);
            data.forEach(item => {
                container.innerHTML += `
                    <div class="food-card">
                        <div class="food-image">
                            <img src="${item.img}" alt="${item.name}">
                        </div>
                        <div class="food-info">
                            <h3>${item.name}</h3>
                            <span class="price">₹${item.price}</span>
                            <button class="add-btn" onclick="addToCart()">Add to Cart</button>
                        </div>
                        <div class="overlay">
                            <p>${item.desc}</p>
                            <button class="add-btn" onclick="addToCart()">Add to Cart</button>
                        </div>
                    </div>
                `;
            });
        }

        let cartCount = 0;
        function addToCart() {
            cartCount++;
            document.getElementById('cart-count').innerText = cartCount;
        }

        window.onload = () => {
            createGrid(starters, 'starters-grid');
            createGrid(mains, 'main-grid');
            createGrid(drinks, 'drinks-grid');
        };
    </script>
</body>
</html>
